        maxMemories:
          type: integer
          minimum: 1
          maximum: 20
          default: 5
        maxRecordChars:
          type: integer
          minimum: 100
          maximum: 5000
          default: 2000
        includeArchived:
          type: boolean
          default: false

    ContextPreviewRequest:
      type: object
      required: [query]
      properties:
        query:
          type: string
          maxLength: 500
        options:
          $ref: "#/components/schemas/ContextPreviewOptions"

    MatchedCategory:
      type: object
