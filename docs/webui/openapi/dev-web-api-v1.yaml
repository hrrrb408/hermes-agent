      required: [pending, approved, rejected, failed, total]
      properties:
        pending:
          type: integer
        approved:
          type: integer
        rejected:
          type: integer
        failed:
          type: integer
        total:
          type: integer

    ReviewQueueStorage:
      type: object
      required: [available, redactedPath]
      properties:
        available:
          type: boolean
        redactedPath:
          type: string
          description: Redacted path (e.g., [dev-home]/memory/reviews)

    ReviewQueueStatusData:
      type: object
      required:
        - available
        - readOnly
        - queueEnabled
        - writeEnabled
        - approveEnabled
        - rejectEnabled
        - enqueueEnabled
        - dryRunEnabled
        - counts
        - storage
      properties:
        available:
          type: boolean
        readOnly:
          type: boolean
          enum: [true]
        queueEnabled:
          type: boolean
          enum: [false]
        writeEnabled:
          type: boolean
          enum: [false]
        approveEnabled:
          type: boolean
          enum: [false]
        rejectEnabled:
          type: boolean
          enum: [false]
        enqueueEnabled:
          type: boolean
          enum: [false]
        dryRunEnabled:
          type: boolean
          enum: [true]
        counts:
          $ref: "#/components/schemas/ReviewQueueCounts"
        storage:
          $ref: "#/components/schemas/ReviewQueueStorage"

    ReviewQueueStatusResponse:
      type: object
      required: [data, meta]
      properties:
        data:
          $ref: "#/components/schemas/ReviewQueueStatusData"
        meta:
          $ref: "#/components/schemas/Meta"

    ReviewListItem:
      type: object
      required:
        - reviewId
        - status
        - decision
        - proposedAction
        - category
        - title
        - summaryPreview
        - tags
        - score
        - reasonCodes
        - targetMemoryId
        - protectedTarget
        - occurrenceCount
        - createdAt
        - updatedAt
      properties:
        reviewId:
          type: string
          pattern: "^MR-\\d{8}T\\d{6}-[0-9a-f]{8}$"
        status:
          type: string
          enum: [pending, approved, rejected, failed]
        decision:
          type: string
          enum: [WRITE, UPDATE, REVIEW, SKIP, SKIP_DUPLICATE, UNDECIDED]
        proposedAction:
          type: string
          enum: [WRITE, UPDATE, UNDECIDED]
        category:
          type: string
        title:
          type: string
          maxLength: 120
        summaryPreview:
          type: string
          maxLength: 120
        tags:
          type: array
          items:
            type: string
        score:
          type: integer
        reasonCodes:
          type: array
          items:
            type: string
        targetMemoryId:
          type: string
          nullable: true
        protectedTarget:
          type: boolean
        occurrenceCount:
          type: integer
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time

    ReviewListData:
      type: object
      required: [items, page]
      properties:
        items:
          type: array
          items:
            $ref: "#/components/schemas/ReviewListItem"
        page:
          $ref: "#/components/schemas/Page"

    ReviewListResponse:
      type: object
      required: [data, meta]
      properties:
        data:
          $ref: "#/components/schemas/ReviewListData"
        meta:
          $ref: "#/components/schemas/Meta"

    ScoreBreakdownEntry:
      type: object
      required: [rule, value]
      properties:
        rule:
          type: string
        value:
          type: integer

    SimilarityScores:
      type: object
      required: [title, summary, combined, overall]
      properties:
        title:
          type: number
        summary:
          type: number
        combined:
          type: number
        overall:
          type: number

    ReviewTarget:
      type: object
      properties:
        memoryId:
          type: string
          nullable: true
        title:
          type: string
          nullable: true
          maxLength: 120
        category:
          type: string
          nullable: true
        protected:
          type: boolean

    ReviewTimestamps:
      type: object
      required: [createdAt, updatedAt, lastSeenAt]
      properties:
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
        lastSeenAt:
          type: string
          format: date-time
        reviewedAt:
          type: string
          format: date-time
          nullable: true

    ReviewErrors:
      type: object
      properties:
        lastError:
          type: string
          nullable: true
          maxLength: 200

    ReviewSafety:
      type: object
      required: [readOnly, approveAvailable, rejectAvailable, writeAvailable, dryRunAvailable]
      properties:
        readOnly:
          type: boolean
          enum: [true]
        approveAvailable:
          type: boolean
          enum: [false]
        rejectAvailable:
          type: boolean
          enum: [false]
        writeAvailable:
          type: boolean
          enum: [false]
        dryRunAvailable:
          type: boolean
          enum: [true]

    ReviewDetailData:
      allOf:
        - $ref: "#/components/schemas/ReviewListItem"
        - type: object
          required: [summary, scoreBreakdown, similarity, target, timestamps, errors, safety]
          properties:
            summary:
              type: string
              maxLength: 300
            scoreBreakdown:
              type: array
              items:
                $ref: "#/components/schemas/ScoreBreakdownEntry"
            similarity:
              $ref: "#/components/schemas/SimilarityScores"
            target:
              $ref: "#/components/schemas/ReviewTarget"
            timestamps:
              $ref: "#/components/schemas/ReviewTimestamps"
            errors:
              $ref: "#/components/schemas/ReviewErrors"
            safety:
              $ref: "#/components/schemas/ReviewSafety"

    ReviewDetailResponse:
      type: object
      required: [data, meta]
      properties:
        data:
          $ref: "#/components/schemas/ReviewDetailData"
        meta:
          $ref: "#/components/schemas/Meta"

    # ── Dry-Run ──
    DryRunTarget:
      type: object
      required: [memoryId, category, operation]
      properties:
        memoryId:
          type: string
          nullable: true
        category:
          type: string
        operation:
          type: string
          enum: [WRITE, UPDATE, REJECT]

    DryRunSafety:
      type: object
      required: [devOnly, productionBlocked]
      properties:
        devOnly:
          type: boolean
          enum: [true]
        productionBlocked:
          type: boolean
          enum: [true]
        protectedTarget:
          type: boolean
        p0Blocked:
          type: boolean
        permanentBlocked:
          type: boolean
        duplicateBlocked:
          type: boolean

    DryRunCheck:
      type: object
      required: [code, status, message]
      properties:
        code:
          type: string
        status:
          type: string
          enum: [pass, fail]
        message:
          type: string
          maxLength: 200

    DryRunPreview:
      type: object
      required: [redactedPaths]
      properties:
        title:
          type: string
          nullable: true
          maxLength: 120
        summaryPreview:
          type: string
          nullable: true
          maxLength: 200
        tags:
          type: array
          items:
            type: string
        reasonPreview:
          type: string
          nullable: true
          maxLength: 200
        redactedPaths:
          type: boolean
          enum: [true]

    DryRunData:
      type: object
      required:
        - reviewId
        - dryRun
        - action
        - allowed
        - wouldModify
        - wouldWriteMemory
        - wouldUpdateReview
        - wouldAppendEvent
        - wouldCreateSnapshot
        - target
        - safety
        - checks
        - effects
        - noEffects
        - warnings
      properties:
        reviewId:
          type: string
        dryRun:
          type: boolean
          enum: [true]
        action:
          type: string
          enum: [APPROVE, REJECT]
        allowed:
          type: boolean
        blockedReason:
          type: string
          nullable: true
          maxLength: 120
        wouldModify:
          type: boolean
        wouldWriteMemory:
          type: boolean
        wouldUpdateReview:
          type: boolean
        wouldAppendEvent:
          type: boolean
        wouldCreateSnapshot:
          type: boolean
          enum: [false]
        target:
          $ref: "#/components/schemas/DryRunTarget"
        safety:
          $ref: "#/components/schemas/DryRunSafety"
        checks:
          type: array
          items:
            $ref: "#/components/schemas/DryRunCheck"
        preview:
          $ref: "#/components/schemas/DryRunPreview"
          nullable: true
        effects:
          type: array
          items:
            type: string
            maxLength: 200
        noEffects:
          type: array
          items:
            type: string
            maxLength: 200
        warnings:
          type: array
          items:
            type: string
            maxLength: 200

    DryRunResponse:
      type: object
      required: [data, meta]
      properties:
        data:
          $ref: "#/components/schemas/DryRunData"
        meta:
          $ref: "#/components/schemas/Meta"

    # ── Execute (Phase 1C) ──
    ReviewExecuteRequest:
      type: object
      required:
        - confirmationText
        - expectedAction
        - reviewUpdatedAt
        - dryRunPreviewed
        - acknowledgedEffects
      properties:
        confirmationText:
          type: string
          description: Must be exactly "APPROVE"
          enum: ["APPROVE"]
        expectedAction:
          type: string
          description: Must be exactly "APPROVE"
          enum: ["APPROVE"]
        reviewUpdatedAt:
          type: string
          description: ISO 8601 timestamp that must match the current item's updated_at
        dryRunPreviewed:
          type: boolean
          description: Must be true — dry-run must be completed first
          enum: [true]
        acknowledgedEffects:
          type: array
          description: Required effects that must be acknowledged
          items:
            type: string
            enum: [WRITE_MEMORY, UPDATE_REVIEW, APPEND_REVIEW_EVENT]
          minItems: 3

    ReviewRejectExecuteRequest:
      type: object
      required:
        - confirmationText
        - expectedAction
        - reviewUpdatedAt
        - dryRunPreviewed
        - acknowledgedEffects
      properties:
        confirmationText:
          type: string
          description: Must be exactly "REJECT"
          enum: ["REJECT"]
        expectedAction:
          type: string
          description: Must be exactly "REJECT"
          enum: ["REJECT"]
        reviewUpdatedAt:
          type: string
          description: ISO 8601 timestamp that must match the current item's updated_at
        dryRunPreviewed:
          type: boolean
          description: Must be true — dry-run must be completed first
          enum: [true]
        acknowledgedEffects:
          type: array
          description: Required effects that must be acknowledged
          items:
            type: string
            enum: [UPDATE_REVIEW, APPEND_REVIEW_EVENT]
          minItems: 2
        reason:
          type: string
          maxLength: 500
          nullable: true
          description: Optional rejection reason (path-redacted before storage)

    ExecuteTarget:
      type: object
      properties:
        memoryId:
          type: string
          nullable: true
        category:
          type: string
        operation:
          type: string

    ExecuteAudit:
      type: object
      required: [actor, timestamp, devOnly]
      properties:
        actor:
          type: string
          enum: ["dev-webui"]
        timestamp:
          type: string
          format: date-time
        devOnly:
          type: boolean
          enum: [true]

    ReviewExecuteData:
      type: object
      required:
        - reviewId
        - executed
        - action
        - statusBefore
        - statusAfter
        - memoryChanged
        - reviewChanged
        - eventAppended
        - target
        - audit
        - warnings
      properties:
        reviewId:
          type: string
        executed:
          type: boolean
          enum: [true]
        action:
          type: string
          enum: [APPROVE, REJECT]
        statusBefore:
          type: string
          enum: [pending]
        statusAfter:
          type: string
          enum: [approved, rejected]
        memoryChanged:
          type: boolean
        reviewChanged:
          type: boolean
        eventAppended:
          type: boolean
        target:
          $ref: "#/components/schemas/ExecuteTarget"
        audit:
          $ref: "#/components/schemas/ExecuteAudit"
        warnings:
          type: array
          items:
            type: string

    ReviewExecuteResponse:
      type: object
      required: [data, meta]
      properties:
        data:
          $ref: "#/components/schemas/ReviewExecuteData"
        meta:
          $ref: "#/components/schemas/Meta"

    MemoryDryRunData:
      type: object
      required: [dryRun, operation, allowed, decision, safety, checks, warnings]
      properties:
        dryRun:
          type: boolean
          description: Always true for dry-run responses.
        operation:
          type: string
          enum: [WRITE, UPDATE, ARCHIVE]
          description: The requested operation.
        allowed:
          type: boolean
          description: Whether the operation would be permitted.
        blockedReason:
          type: string
          nullable: true
          description: Reason the operation is blocked (null if allowed).
        decision:
          type: string
          enum: [WRITE, UPDATE, REVIEW, SKIP, SKIP_DUPLICATE, ARCHIVE]
          description: The Memory Writer decision.
        wouldModify:
          type: boolean
          description: Whether any files would be modified if executed.
        wouldEnqueueReview:
          type: boolean
          description: Whether a review queue item would be enqueued.
        target:
          $ref: "#/components/schemas/MemoryDryRunTarget"
        candidate:
          $ref: "#/components/schemas/MemoryDryRunCandidate"
        score:
          type: object
          properties:
            total:
              type: integer
            breakdown:
              type: array
              items:
                type: object
                properties:
                  rule:
                    type: string
                  value:
                    type: integer
        similarity:
          type: object
          nullable: true
          properties:
            title:
              type: number
            summary:
              type: number
            combined:
              type: number
            overall:
              type: number
            tagOverlap:
              type: array
              items:
                type: string
            coreTagOverlap:
              type: array
              items:
                type: string
            matchedMemoryId:
              type: string
              nullable: true
            matchedMemoryTitle:
              type: string
              nullable: true
        diff:
          type: object
          nullable: true
          properties:
            titleChanged:
              type: boolean
            summaryChanged:
              type: boolean
            importanceChanged:
              type: boolean
            ttlChanged:
              type: boolean
            tagsAdded:
              type: array
              items:
                type: string
            tagsRemoved:
              type: array
              items:
                type: string
        checks:
          type: array
          items:
            $ref: "#/components/schemas/MemoryDryRunCheck"
        effects:
          type: array
          items:
            $ref: "#/components/schemas/MemoryDryRunEffect"
        noEffects:
          type: array
          items:
            type: string
        safety:
          type: object
          properties:
            readOnly:
              type: boolean
            writeEnabled:
              type: boolean
            executeAvailable:
              type: boolean
            sideEffects:
              type: boolean
        config:
          type: object
          properties:
            autoWriteEnabled:
              type: boolean
            autoUpdateEnabled:
              type: boolean
            autoCreateCategories:
              type: boolean
            writeThreshold:
              type: integer
            reviewThreshold:
              type: integer
            updateSimilarityThreshold:
              type: number
            duplicateSimilarityThreshold:
              type: number
            candidateSimilarityThreshold:
              type: number
        warnings:
          type: array
          items:
            type: string

    MemoryDryRunTarget:
      type: object
      nullable: true
      properties:
        memoryId:
          type: string
        title:
          type: string
        category:
          type: string
        importance:
          type: string
        ttl:
          type: string
        status:
          type: string
        protected:
          type: boolean
        protectionReason:
          type: string
          nullable: true

    MemoryDryRunCandidate:
      type: object
      nullable: true
      properties:
        titlePreview:
          type: string
        summaryPreview:
          type: string
        category:
          type: string
        type:
          type: string
        importance:
          type: string
        ttl:
          type: string
        tags:
          type: array
          items:
            type: string

    MemoryDryRunCheck:
      type: object
      properties:
        code:
          type: string
        passed:
          type: boolean
        message:
          type: string

    MemoryDryRunEffect:
      type: object
      properties:
        type:
          type: string
        wouldOccur:
          type: boolean
        description:
          type: string

    MemoryDryRunResponse:
      type: object
      required: [data, meta]
      properties:
        data:
          $ref: "#/components/schemas/MemoryDryRunData"
        meta:
          $ref: "#/components/schemas/Meta"

    # ── Phase 1E: Agent Preview ──

    AgentPreviewResponse:
      type: object
      required: [data, meta]
      properties:
        data:
          $ref: "#/components/schemas/AgentPreviewData"
        meta:
          $ref: "#/components/schemas/Meta"

    AgentPreviewData:
      type: object
      required: [dryRun, operation, allowed, session, model, prompt, memoryContext, capabilities, checks, noEffects, safety, warnings]
      properties:
        dryRun:
          type: boolean
          description: Always true — this is a dry-run preview.
        operation:
          type: string
          enum: [PROMPT_PREVIEW, AGENT_RUN_DRY_RUN]
        allowed:
          type: boolean
        blockedReason:
          type: string
          nullable: true
        session:
          $ref: "#/components/schemas/AgentPreviewSession"
        model:
          $ref: "#/components/schemas/AgentPreviewModel"
        prompt:
          $ref: "#/components/schemas/AgentPromptMetadata"
        memoryContext:
          $ref: "#/components/schemas/AgentMemoryContextPreview"
        capabilities:
          $ref: "#/components/schemas/AgentCapabilityPreview"
        checks:
          type: array
          items:
            $ref: "#/components/schemas/AgentPreviewCheck"
        noEffects:
          type: array
          items:
            type: string
        safety:
          $ref: "#/components/schemas/AgentPreviewSafety"
        warnings:
          type: array
          items:
            type: string
        userMessagePreview:
          type: string
          description: Redacted preview of the user message (prompt preview only).

    AgentPreviewSession:
      type: object
      properties:
