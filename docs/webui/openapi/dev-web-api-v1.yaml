          type: string
        exists:
          type: boolean
        historyIncluded:
          type: boolean
        historyMessageCount:
          type: integer
        historyTruncated:
          type: boolean

    AgentPreviewModel:
      type: object
      properties:
        name:
          type: string
        provider:
          type: string
        temperature:
          type: number
          nullable: true
        maxOutputTokens:
          type: integer
          nullable: true

    AgentPromptMetadata:
      type: object
      properties:
        sectionCount:
          type: integer
        characterCount:
          type: integer
        truncated:
          type: boolean
        sections:
          type: array
          items:
            $ref: "#/components/schemas/AgentPromptSection"

    AgentPromptSection:
      type: object
      properties:
        type:
          type: string
        included:
          type: boolean
        characterCount:
          type: integer
        messageCount:
          type: integer
          nullable: true
        preview:
          type: string
          nullable: true
        redacted:
          type: boolean

    AgentMemoryContextPreview:
      type: object
      properties:
        enabled:
          type: boolean
        categoryCount:
          type: integer
        memoryCount:
          type: integer
        items:
          type: array
          items:
            $ref: "#/components/schemas/AgentMemoryContextItem"
        truncated:
          type: boolean

    AgentMemoryContextItem:
      type: object
      properties:
        memoryId:
          type: string
        title:
          type: string
        category:
          type: string
        score:
          type: integer
        summaryPreview:
          type: string

    AgentCapabilityPreview:
      type: object
      properties:
        llmCallRequested:
          type: boolean
        llmCallAvailable:
          type: boolean
        llmCallForcedDisabled:
          type: boolean
        streamingRequested:
          type: boolean
        streamingAvailable:
          type: boolean
        streamingForcedDisabled:
          type: boolean
        toolsRequested:
          type: boolean
        toolExecutionAvailable:
          type: boolean
        toolExecutionForcedDisabled:
          type: boolean
        autoMemoryRequested:
          type: boolean
        memoryWriteAvailable:
          type: boolean
        memoryWriteForcedDisabled:
          type: boolean
        sessionWriteAvailable:
          type: boolean
        reviewQueueAvailable:
          type: boolean

    AgentPreviewCheck:
      type: object
      properties:
        code:
          type: string
        passed:
          type: boolean
        message:
          type: string

    AgentPreviewSafety:
      type: object
      properties:
        readOnly:
          type: boolean
        sideEffects:
          type: boolean
        llmCalled:
          type: boolean
        toolsExecuted:
          type: boolean
        sessionWritten:
          type: boolean
        memoryWritten:
          type: boolean
        reviewQueued:
          type: boolean

    # ── Phase 1G: Tool Policy ──

    ToolPolicyExecution:
      type: object
      required: [implemented, enabled, providerSchemaSent, dispatchAvailable, auditAvailable]
      properties:
        implemented:
          type: boolean
          enum: [false]
        enabled:
          type: boolean
          enum: [false]
        providerSchemaSent:
          type: boolean
          enum: [false]
        dispatchAvailable:
          type: boolean
          enum: [false]
        auditAvailable:
          type: boolean
          enum: [false]

    ToolPolicySafety:
      type: object
      required: [readOnly, sideEffects, writeEnabled, executeAvailable, policyMutationAvailable]
      properties:
        readOnly:
          type: boolean
          enum: [true]
        sideEffects:
          type: boolean
          enum: [false]
        writeEnabled:
          type: boolean
          enum: [false]
        executeAvailable:
          type: boolean
          enum: [false]
        policyMutationAvailable:
          type: boolean
          enum: [false]

    ToolPolicyLimits:
      type: object
      required:
        - maxArgumentPayloadBytes
        - maxArgumentNestingDepth
        - maxArgumentStringLength
        - maxArgumentArrayLength
        - defaultR0TimeoutSeconds
        - defaultR1TimeoutSeconds
        - maxToolTimeoutSeconds
        - maxToolCallsPerRun
        - maxGlobalConcurrency
        - maxConcurrencyPerRun
        - maxSerializedOutputBytes
        - maxAgentVisibleOutputBytes
        - maxWebPreviewOutputBytes
      properties:
        maxArgumentPayloadBytes:
          type: integer
        maxArgumentNestingDepth:
          type: integer
        maxArgumentStringLength:
          type: integer
        maxArgumentArrayLength:
          type: integer
        defaultR0TimeoutSeconds:
          type: integer
        defaultR1TimeoutSeconds:
          type: integer
        maxToolTimeoutSeconds:
          type: integer
        maxToolCallsPerRun:
          type: integer
        maxGlobalConcurrency:
          type: integer
        maxConcurrencyPerRun:
          type: integer
        maxSerializedOutputBytes:
          type: integer
        maxAgentVisibleOutputBytes:
          type: integer
        maxWebPreviewOutputBytes:
          type: integer

    ToolPolicyStatusData:
      type: object
      required: [mode, inventoryCount, riskCounts, permanentDenylistCount, candidateAllowlistCount, enabledAllowlistCount, execution, limits, safety]
      properties:
        mode:
          type: string
          enum: [DEFAULT_DENY]
        inventoryCount:
          type: integer
        riskCounts:
          type: object
          properties:
            R0:
              type: integer
            R1:
              type: integer
            R2:
              type: integer
            R3:
              type: integer
            R4:
              type: integer
            R5:
              type: integer
        permanentDenylistCount:
          type: integer
        candidateAllowlistCount:
          type: integer
        enabledAllowlistCount:
          type: integer
        execution:
          $ref: "#/components/schemas/ToolPolicyExecution"
        limits:
          $ref: "#/components/schemas/ToolPolicyLimits"
        safety:
          $ref: "#/components/schemas/ToolPolicySafety"

    ToolPolicyStatusResponse:
      type: object
      required: [data, meta]
      properties:
        data:
          $ref: "#/components/schemas/ToolPolicyStatusData"
        meta:
          $ref: "#/components/schemas/Meta"

    ToolCatalogItem:
      type: object
      required:
        - canonicalName
        - primaryRisk
        - riskRank
        - capabilities
        - permanentlyDenied
        - candidateAllowlisted
        - staticallyAllowed
        - allowed
        - policyStatus
        - reasonCode
        - sourceModule
        - rationalePreview
        - executionAvailable
        - schemaPreviewAvailable
        - dryRunAvailable
      properties:
        canonicalName:
          type: string
        primaryRisk:
          type: string
        riskRank:
          type: string
        capabilities:
          type: array
          items:
            type: string
        permanentlyDenied:
          type: boolean
        candidateAllowlisted:
          type: boolean
        staticallyAllowed:
          type: boolean
        allowed:
          type: boolean
          enum: [false]
        policyStatus:
          type: string
          enum: [PERMANENTLY_DENIED, CANDIDATE, UNLISTED, STATICALLY_ALLOWED]
        reasonCode:
          type: string
        sourceModule:
          type: string
        rationalePreview:
          type: string
        executionAvailable:
          type: boolean
          enum: [false]
        schemaPreviewAvailable:
          type: boolean
          enum: [false]
        dryRunAvailable:
          type: boolean
          enum: [false]

    ToolCatalogSummary:
      type: object
      required: [inventoryCount, permanentDenylistCount, candidateAllowlistCount, enabledAllowlistCount]
      properties:
        inventoryCount:
          type: integer
        permanentDenylistCount:
          type: integer
        candidateAllowlistCount:
          type: integer
        enabledAllowlistCount:
          type: integer

    ToolCatalogSafety:
      type: object
      required: [readOnly, sideEffects, executeAvailable]
      properties:
        readOnly:
          type: boolean
          enum: [true]
        sideEffects:
          type: boolean
          enum: [false]
        executeAvailable:
          type: boolean
          enum: [false]

    ToolCatalogFilters:
      type: object
      required: [sort]
      properties:
        q:
          type: string
          nullable: true
        risk:
          type: string
          nullable: true
        capability:
          type: string
          nullable: true
        policyStatus:
          type: string
          nullable: true
        sort:
          type: string

    ToolCatalogData:
      type: object
      required: [items, page, pageSize, total, totalPages, filters, summary, safety]
      properties:
        items:
          type: array
          items:
            $ref: "#/components/schemas/ToolCatalogItem"
        page:
          type: integer
        pageSize:
          type: integer
        total:
          type: integer
        totalPages:
          type: integer
        filters:
          $ref: "#/components/schemas/ToolCatalogFilters"
        summary:
          $ref: "#/components/schemas/ToolCatalogSummary"
        safety:
          $ref: "#/components/schemas/ToolCatalogSafety"

    ToolCatalogResponse:
      type: object
      required: [data, meta]
      properties:
        data:
          $ref: "#/components/schemas/ToolCatalogData"
        meta:
          $ref: "#/components/schemas/Meta"
