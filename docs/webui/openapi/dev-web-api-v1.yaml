        - maxArgumentNestingDepth
        - maxArgumentStringLength
        - maxArgumentArrayLength
        - defaultR0TimeoutSeconds
        - defaultR1TimeoutSeconds
        - maxToolTimeoutSeconds
        - maxToolCallsPerRun
        - maxGlobalConcurrency
        - maxConcurrencyPerRun
        - maxSerializedOutputBytes
        - maxAgentVisibleOutputBytes
        - maxWebPreviewOutputBytes
      properties:
        maxArgumentPayloadBytes:
          type: integer
        maxArgumentNestingDepth:
          type: integer
        maxArgumentStringLength:
          type: integer
        maxArgumentArrayLength:
          type: integer
        defaultR0TimeoutSeconds:
          type: integer
        defaultR1TimeoutSeconds:
          type: integer
        maxToolTimeoutSeconds:
          type: integer
        maxToolCallsPerRun:
          type: integer
        maxGlobalConcurrency:
          type: integer
        maxConcurrencyPerRun:
          type: integer
        maxSerializedOutputBytes:
          type: integer
        maxAgentVisibleOutputBytes:
          type: integer
        maxWebPreviewOutputBytes:
          type: integer

    ToolPolicyStatusData:
      type: object
      required: [mode, inventoryCount, riskCounts, permanentDenylistCount, candidateAllowlistCount, enabledAllowlistCount, execution, limits, safety]
      properties:
        mode:
          type: string
          enum: [DEFAULT_DENY]
        inventoryCount:
          type: integer
        riskCounts:
          type: object
          properties:
            R0:
              type: integer
            R1:
              type: integer
            R2:
              type: integer
            R3:
              type: integer
            R4:
              type: integer
            R5:
              type: integer
        permanentDenylistCount:
          type: integer
        candidateAllowlistCount:
          type: integer
        enabledAllowlistCount:
          type: integer
        execution:
          $ref: "#/components/schemas/ToolPolicyExecution"
        limits:
          $ref: "#/components/schemas/ToolPolicyLimits"
        safety:
          $ref: "#/components/schemas/ToolPolicySafety"

    ToolPolicyStatusResponse:
      type: object
      required: [data, meta]
      properties:
        data:
          $ref: "#/components/schemas/ToolPolicyStatusData"
        meta:
          $ref: "#/components/schemas/Meta"

    ToolCatalogItem:
      type: object
      required:
        - canonicalName
        - primaryRisk
        - riskRank
        - capabilities
        - permanentlyDenied
        - candidateAllowlisted
        - staticallyAllowed
        - allowed
        - policyStatus
        - reasonCode
        - sourceModule
        - rationalePreview
        - executionAvailable
        - schemaPreviewAvailable
        - dryRunAvailable
      properties:
        canonicalName:
          type: string
        primaryRisk:
          type: string
        riskRank:
          type: string
        capabilities:
          type: array
          items:
            type: string
        permanentlyDenied:
          type: boolean
        candidateAllowlisted:
          type: boolean
        staticallyAllowed:
          type: boolean
        allowed:
          type: boolean
          enum: [false]
        policyStatus:
          type: string
          enum: [PERMANENTLY_DENIED, CANDIDATE, UNLISTED, STATICALLY_ALLOWED]
        reasonCode:
          type: string
        sourceModule:
          type: string
        rationalePreview:
          type: string
        executionAvailable:
          type: boolean
          enum: [false]
        schemaPreviewAvailable:
          type: boolean
          enum: [false]
        dryRunAvailable:
          type: boolean
          enum: [false]

    ToolCatalogSummary:
      type: object
      required: [inventoryCount, permanentDenylistCount, candidateAllowlistCount, enabledAllowlistCount]
      properties:
        inventoryCount:
          type: integer
        permanentDenylistCount:
          type: integer
        candidateAllowlistCount:
          type: integer
        enabledAllowlistCount:
          type: integer

    ToolCatalogSafety:
      type: object
      required: [readOnly, sideEffects, executeAvailable]
      properties:
        readOnly:
          type: boolean
          enum: [true]
        sideEffects:
          type: boolean
          enum: [false]
        executeAvailable:
          type: boolean
          enum: [false]

    ToolCatalogFilters:
      type: object
      required: [sort]
      properties:
        q:
          type: string
          nullable: true
        risk:
          type: string
          nullable: true
        capability:
          type: string
          nullable: true
        policyStatus:
          type: string
          nullable: true
        sort:
          type: string

    ToolCatalogData:
      type: object
      required: [items, page, pageSize, total, totalPages, filters, summary, safety]
      properties:
        items:
          type: array
          items:
            $ref: "#/components/schemas/ToolCatalogItem"
        page:
          type: integer
        pageSize:
          type: integer
        total:
          type: integer
        totalPages:
          type: integer
        filters:
          $ref: "#/components/schemas/ToolCatalogFilters"
        summary:
          $ref: "#/components/schemas/ToolCatalogSummary"
        safety:
          $ref: "#/components/schemas/ToolCatalogSafety"

    ToolCatalogResponse:
      type: object
      required: [data, meta]
      properties:
        data:
          $ref: "#/components/schemas/ToolCatalogData"
        meta:
          $ref: "#/components/schemas/Meta"

    # ── Phase 1G-03: Tool Schema Preview ──

    ToolSchemaPreviewField:
      type: object
      required: [fieldName, fieldType, required, descriptionPreview, enumPreview, defaultPresence, constraintsPreview]
      properties:
        fieldName:
          type: string
          description: Parameter name
        fieldType:
          type: string
          description: >
            Sanitized JSON Schema type. One of: string, number, integer,
            boolean, array, object, null, unknown.
        required:
          type: boolean
          description: Whether this field is required
        descriptionPreview:
          type: string
          nullable: true
          maxLength: 240
          description: Truncated description (max 240 chars)
        enumPreview:
          type: array
          items:
            type: string
            maxLength: 80
          nullable: true
          description: Enum values (max 20 items, each max 80 chars)
        defaultPresence:
          type: boolean
          description: Whether a default value exists (value NOT exposed)
        constraintsPreview:
          type: string
          nullable: true
          maxLength: 120
          description: Brief constraint summary (max 120 chars)

    ToolSchemaPreviewItem:
      type: object
      required:
        - canonicalName
        - risk
        - capabilities
        - schemaPreviewAvailable
        - schemaShape
        - inputFields
        - redactionStatus
        - reasonCode
        - unavailableReason
      properties:
        canonicalName:
          type: string
          description: Tool canonical name
        risk:
          type: string
          description: Primary risk level (R0–R5)
        capabilities:
          type: array
          items:
            type: string
          description: Tool capability tags
        schemaPreviewAvailable:
          type: boolean
          description: Whether schema preview is available
        schemaShape:
          type: string
          description: Top-level schema shape (object, array, primitive, unknown)
        inputFields:
          type: array
          items:
            $ref: "#/components/schemas/ToolSchemaPreviewField"
          description: Redacted field definitions
        redactionStatus:
          type: string
          description: One of clean, redacted, unavailable
        reasonCode:
          type: string
          description: >
            Reason code when preview is unavailable. Null when available.
            Values: RISK_R4_EXECUTION, RISK_R5_SYSTEM, PERMANENTLY_DENIED,
            UNLISTED, UNAVAILABLE_EMPTY_SCHEMA, UNAVAILABLE_SCHEMA_SOURCE_ERROR, etc.
        unavailableReason:
          type: string
          nullable: true
          description: Human-readable unavailability reason

    ToolSchemaPreviewCatalogData:
      type: object
      required: [totalCount, availableCount, unavailableCount, items]
      properties:
        totalCount:
          type: integer
          description: Total number of tools in the policy inventory
        availableCount:
          type: integer
          description: Number of tools with schema preview available
        unavailableCount:
          type: integer
          description: Number of tools without schema preview
        items:
          type: array
          items:
            $ref: "#/components/schemas/ToolSchemaPreviewItem"

    ToolSchemaPreviewCatalogResponse:
      type: object
      required: [data, meta]
      properties:
        data:
          $ref: "#/components/schemas/ToolSchemaPreviewCatalogData"
        meta:
          $ref: "#/components/schemas/Meta"

    ToolSchemaPreviewLookupData:
      type: object
      required: [found, preview, reasonCode]
      properties:
        found:
          type: boolean
          description: Whether the canonical name exists in the policy inventory
        preview:
          $ref: "#/components/schemas/ToolSchemaPreviewItem"
          nullable: true
        reasonCode:
          type: string
          description: 'Result code: "FOUND" when found, "NOT_FOUND" when not found'

    ToolSchemaPreviewLookupResponse:
      type: object
      required: [data, meta]
      properties:
        data:
          $ref: "#/components/schemas/ToolSchemaPreviewLookupData"
        meta:
          $ref: "#/components/schemas/Meta"

    # ── Phase 1G-04: Tool Dry-Run ──

    ToolDryRunRequest:
      type: object
      required: [canonicalName]
      properties:
        canonicalName:
          type: string
          minLength: 1
          maxLength: 256
          description: Exact tool canonical name to evaluate.
        argumentsPreview:
          type: object
          nullable: true
          description: >
            Proposed arguments for dry-run evaluation. Must be a JSON object
            if present. Never executed or dispatched.
        sourceContext:
          type: string
          nullable: true
          maxLength: 512
          description: Optional source context description.
        uiOrigin:
          type: string
          nullable: true
          maxLength: 256
          description: Optional UI component identifier.
        requestId:
          type: string
          nullable: true
          maxLength: 128
          description: Client-side request correlation ID. Not durable, not stored.
        issueConfirmationToken:
          type: boolean
          nullable: true
          default: false
          description: >
            If true, and the dry-run decision is would_allow, and audit is written,
            and the canonicalName is on the static allowlist, a confirmation token
            will be issued and returned in the response. Token is only issued for
            allowlisted tools with successful dry-run results.

    ToolDryRunDecision:
      type: string
      enum: [would_allow, would_block, would_redact, requires_review]
      description: >
        Dry-run policy decision values:
        - would_allow: Tool would be allowed for dry-run simulation (R0/R1)
        - would_block: Tool would be blocked (denylist, R4, R5, unknown)
        - would_redact: Tool arguments would be redacted (R3 with sensitive args)
        - requires_review: Tool requires additional review (R2, R3 without sensitive args)

    ToolDryRunErrorCode:
      type: string
      enum:
        - TOOL_DRY_RUN_INVALID_REQUEST
        - TOOL_DRY_RUN_INVALID_CANONICAL_NAME
        - TOOL_DRY_RUN_INVALID_ARGUMENTS
        - TOOL_DRY_RUN_POLICY_UNAVAILABLE
        - TOOL_DRY_RUN_INTERNAL_ERROR
      description: Error codes for dry-run API responses.

    ToolDryRunData:
      type: object
      required:
        - canonicalName
        - exists
        - riskTier
        - decision
        - reasonCodes
        - policyNotes
        - redactedArgumentsPreview
        - forbiddenFields
        - missingRequiredFields
        - executionAllowed
        - dispatchAllowed
        - providerSchemaAllowed
        - auditWritten
      properties:
        canonicalName:
          type: string
          description: The requested tool canonical name.
        exists:
          type: boolean
          description: Whether the tool exists in the policy inventory.
        riskTier:
          type: string
          nullable: true
          description: Risk tier string (e.g. "R0") or null if unknown.
        decision:
          $ref: "#/components/schemas/ToolDryRunDecision"
        reasonCodes:
          type: array
          items:
            type: string
          description: Machine-readable reason codes for the decision.
        policyNotes:
          type: array
          items:
            type: string
          description: Human-readable policy notes.
        redactedArgumentsPreview:
          type: object
          description: Sanitized arguments with secrets redacted.
        forbiddenFields:
          type: array
          items:
            type: string
          description: Field paths that were redacted.
        missingRequiredFields:
          type: array
          items:
            type: string
          description: "Required fields not present (future: schema validation)."
        executionAllowed:
          type: boolean
          enum: [false]
          description: Always false. Execution requires separate phase approval.
        dispatchAllowed:
          type: boolean
          enum: [false]
          description: Always false.
        providerSchemaAllowed:
          type: boolean
          enum: [false]
          description: Always false. Provider schema sending requires separate phase.
        auditWritten:
          type: boolean
          description: Whether a local dev-only dry-run audit event was safely written. true means the audit JSONL write succeeded; false means no audit was written or the audit write failed. This does not imply tool execution, dispatch, provider schema sending, or provider API access.
        confirmationToken:
          type: string
          nullable: true
          description: >
            Opaque confirmation token string. Only present when issueConfirmationToken=true
            in the request, dry-run decision is would_allow, audit is written, and the
            canonicalName is on the static allowlist. This token is returned exactly once
            and must be provided in the execute request. It is not stored server-side.
        confirmationTokenId:
          type: string
          nullable: true
          description: >
            Token ID for correlation and audit. Only present when a confirmation token
            was issued. Safe for logging and display.
        confirmationTokenExpiresAt:
          type: string
          nullable: true
          format: date-time
          description: >
            ISO 8601 timestamp when the confirmation token expires. Only present when
            a confirmation token was issued. Token TTL is at most 5 minutes.
        dryRunDecisionDigest:
          type: string
          nullable: true
          description: >
            SHA-256 digest binding the dry-run decision package. Present when
            digest computation succeeds. Uses sha256:<hex> format.
        digestAlgorithm:
          type: string
          nullable: true
          description: >
            Algorithm used for dryRunDecisionDigest computation (e.g. "sha256").
        digestPackageVersion:
          type: string
          nullable: true
          description: >
            Version of the digest package schema used for dryRunDecisionDigest.
        canonicalizationVersion:
          type: string
          nullable: true
          description: >
            Version of the canonicalization algorithm used for dryRunDecisionDigest.

    ToolDryRunResponse:
      type: object
      required: [ok, data, error, meta]
      properties:
        ok:
          type: boolean
          description: True for success, false for error.
        data:
          $ref: "#/components/schemas/ToolDryRunData"
          nullable: true
        error:
          type: object
          nullable: true
          required: [code, message]
          properties:
            code:
              $ref: "#/components/schemas/ToolDryRunErrorCode"
            message:
              type: string
              description: Human-readable error description.
        meta:
          $ref: "#/components/schemas/Meta"

    ToolDryRunPolicySummary:
      type: object
      required: [totalCount, dryRunAllowCount, blockedCount, reviewCount, redactedCount]
      properties:
        totalCount:
          type: integer
          description: Total tools in inventory.
        dryRunAllowCount:
          type: integer
          description: Tools that would be allowed for dry-run simulation.
        blockedCount:
          type: integer
          description: Tools that would be blocked.
        reviewCount:
          type: integer
          description: Tools that require review.
        redactedCount:
          type: integer
          description: Tools that would require argument redaction.

    # ── Tool Execute (Phase 1G-04-11) ──

    ToolExecuteRequest:
      type: object
      required: [canonicalName]
      properties:
        canonicalName:
          type: string
          maxLength: 256
          description: The canonical tool name to evaluate for execution.
        argumentsPreview:
          type: object
          nullable: true
          description: Optional preview of arguments (redacted by server).
        dryRunRequestId:
          type: string
          maxLength: 256
          nullable: true
          description: Request ID from a prior dry-run evaluation.
        dryRunDecisionDigest:
          type: string
          maxLength: 256
          nullable: true
          description: SHA-256 digest binding to the prior dry-run decision.
        confirmationToken:
          type: string
          maxLength: 512
          nullable: true
          description: Single-use confirmation token (future phase).
        requestId:
          type: string
          maxLength: 128
          nullable: true
          description: Client-provided request ID for tracing.
        sourceContext:
          type: string
          maxLength: 256
          nullable: true
          description: Origin context (e.g. panel name).
        uiOrigin:
          type: string
          maxLength: 256
          nullable: true
          description: UI component that initiated the request.
        clientCreatedAt:
          type: string
          maxLength: 64
          nullable: true
          description: Client-side timestamp (ISO 8601).

    ToolExecuteDecision:
      type: string
      enum:
        - blocked
        - blocked_requires_dry_run
        - blocked_requires_audit
        - blocked_requires_confirmation
        - blocked_by_kill_switch
        - blocked_by_allowlist
        - blocked_by_denylist
        - blocked_by_risk_tier
        - blocked_by_digest_mismatch
        - blocked_requires_confirmation_token
        - blocked_digest_verification_not_implemented
        - blocked_digest_missing
        - blocked_digest_unavailable
        - blocked_digest_canonicalization_failed
        - blocked_digest_stale
        - blocked_digest_expired
        - blocked_pre_execution_audit_not_implemented
        - blocked_handler_lookup_not_enabled
        - blocked_handler_lookup_unavailable
        - blocked_handler_lookup_not_found
        - blocked_handler_lookup_not_allowlisted
        - blocked_handler_lookup_registry_unavailable
        - blocked_handler_lookup_descriptor_invalid
        - blocked_handler_lookup_side_effect_risk
        - blocked_handler_lookup_policy_mismatch
        - blocked_dispatch_not_enabled
        - blocked_dispatch_unavailable
        - blocked_dispatch_plan_unavailable
        - blocked_dispatch_plan_invalid
        - blocked_dispatch_handler_descriptor_missing
        - blocked_dispatch_handler_descriptor_mismatch
        - blocked_dispatch_not_allowlisted
        - blocked_dispatch_policy_mismatch
        - blocked_dispatch_side_effect_risk
        - blocked_dispatch_registry_mismatch
        - blocked_tool_handler_call_not_enabled
      description: >
        Execute gate decision. All values represent blocked states in Phase 1G-04-28.
        would_execute, executed, and execution_failed are reserved for future phases
        and are not returned by the current implementation.

    ToolExecuteErrorCode:
      type: string
      enum:
        - kill_switch_disabled
        - agent_tools_disabled
        - allowlist_missing
        - tool_unknown
        - tool_denylisted
        - risk_tier_blocked
        - dry_run_missing
        - dry_run_not_found
        - dry_run_expired
        - dry_run_not_allowed
        - dry_run_audit_missing
        - dry_run_canonical_name_mismatch
        - dry_run_risk_tier_mismatch
        - dry_run_policy_version_mismatch
        - dry_run_digest_mismatch
        - dry_run_lookup_unavailable
        - dry_run_digest_missing
        - confirmation_missing
        - confirmation_invalid
        - confirmation_not_implemented
        - confirmation_expired
        - confirmation_reused
        - confirmation_store_unavailable
        - confirmation_not_found
        - confirmation_dry_run_mismatch
        - confirmation_digest_mismatch
        - confirmation_canonical_name_mismatch
        - confirmation_risk_tier_mismatch
        - confirmation_policy_version_mismatch
        - confirmation_audit_event_mismatch
        - confirmation_arguments_mismatch
        - confirmation_consume_failed
        - confirmation_issuance_rejected
        - confirmation_production_path
        - confirmation_not_allowed
        - confirmation_audit_not_written
        - digest_verification_not_implemented
        - digest_mismatch
        - digest_missing
        - digest_unavailable
        - digest_historical_missing
        - digest_token_binding_missing
        - digest_request_mismatch
        - digest_token_mismatch
        - digest_execute_mismatch
        - digest_stale
        - digest_expired
        - digest_verified_but_pre_execution_audit_not_implemented
        - pre_execution_audit_unavailable
        - pre_execution_audit_path_forbidden
        - pre_execution_audit_write_failed
        - pre_execution_audit_invalid_state
        - pre_execution_audit_missing_required_field
        - pre_execution_audit_serialization_failed
        - pre_execution_audit_written_but_handler_lookup_not_enabled
        - handler_lookup_not_enabled
        - handler_lookup_unavailable
        - handler_lookup_not_found
        - handler_lookup_not_allowlisted
        - handler_lookup_registry_unavailable
        - handler_lookup_descriptor_invalid
        - handler_lookup_side_effect_risk
        - handler_lookup_policy_mismatch
        - handler_lookup_written_but_dispatch_not_enabled
        - dispatch_not_enabled
        - dispatch_unavailable
        - dispatch_plan_unavailable
        - dispatch_plan_invalid
        - dispatch_handler_descriptor_missing
        - dispatch_handler_descriptor_mismatch
        - dispatch_not_allowlisted
        - dispatch_policy_mismatch
        - dispatch_side_effect_risk
        - dispatch_registry_mismatch
        - dispatch_written_but_tool_handler_call_not_enabled
        - tool_handler_call_not_enabled
        - validation_failed
        - execution_not_implemented
        - internal_error
      description: Machine-readable error code for the blocked decision.

    ToolExecuteGateStatusItem:
      type: object
      required: [gate, passed]
      properties:
        gate:
          type: string
          description: Gate name (e.g. kill_switch, static_allowlist, known_tool).
        passed:
          type: boolean
          description: Whether this gate passed.
        errorCode:
          type: string
          nullable: true
          description: Error code if gate failed, null if passed.

    ToolExecuteAuditStatus:
      type: object
      required: [auditAttempted, auditWritten]
      properties:
        auditAttempted:
          type: boolean
          enum: [false]
          description: Always false in skeleton phase. No audit is attempted.
        auditWritten:
          type: boolean
          enum: [false]
          description: Always false in skeleton phase.
        auditError:
          type: string
          nullable: true
          description: Always null in skeleton phase.

    ToolExecuteResultPreview:
      type: object
      required: [available, previewSizeBytes, truncated]
      properties:
        available:
          type: boolean
          enum: [false]
          description: Always false in skeleton phase.
        previewType:
          type: string
          nullable: true
          description: Always null in skeleton phase.
        previewSizeBytes:
          type: integer
          enum: [0]
          description: Always 0 in skeleton phase.
        truncated:
          type: boolean
          enum: [false]
          description: Always false in skeleton phase.

    ToolExecuteData:
      type: object
      required:
        - canonicalName
        - exists
        - riskTier
        - decision
        - gateStatus
        - auditStatus
        - resultPreview
        - executionAttempted
        - executionStarted
        - executionCompleted
        - executionAllowed
        - dispatchAllowed
        - providerSchemaAllowed
        - toolHandlerCalled
        - providerApiCalled
        - errorCode
        - policyNotes
        - reasonCodes
      properties:
        canonicalName:
          type: string
          description: The requested tool canonical name.
        exists:
          type: boolean
          description: Whether the tool exists in the policy inventory.
        riskTier:
          type: string
          nullable: true
          description: Risk tier string (e.g. "R0") or null if unknown.
        decision:
          $ref: "#/components/schemas/ToolExecuteDecision"
        gateStatus:
          type: array
          items:
            $ref: "#/components/schemas/ToolExecuteGateStatusItem"
          description: Ordered list of gate evaluations.
        auditStatus:
          $ref: "#/components/schemas/ToolExecuteAuditStatus"
        resultPreview:
          $ref: "#/components/schemas/ToolExecuteResultPreview"
        executionAttempted:
          type: boolean
          enum: [false]
          description: Always false. No execution is attempted in this phase.
        executionStarted:
          type: boolean
          enum: [false]
          description: Always false. No execution is started in this phase.
        executionCompleted:
          type: boolean
          enum: [false]
          description: Always false. No execution completes in this phase.
        executionAllowed:
          type: boolean
          enum: [false]
          description: Always false. Execution requires separate phase approval.
        dispatchAllowed:
          type: boolean
          enum: [false]
          description: Always false. No dispatch occurs in this phase.
        providerSchemaAllowed:
          type: boolean
          enum: [false]
          description: Always false. Provider schema sending requires separate phase.
        toolHandlerCalled:
          type: boolean
          enum: [false]
          description: Always false. No tool handler is called in this phase.
        providerApiCalled:
          type: boolean
          enum: [false]
          description: Always false. No provider API is called in this phase.
        errorCode:
          type: string
          nullable: true
          description: Machine-readable error code or null if no specific error.
        policyNotes:
          type: array
          items:
            type: string
          description: Human-readable policy notes explaining the decision.
        reasonCodes:
          type: array
          items:
            type: string
          description: Machine-readable reason codes for the decision.
        preExecutionAuditId:
          type: string
          nullable: true
          description: >
            Pre-execution audit correlation ID (prefix "pea_"). Only present
            after a successful pre-execution audit write. Not an authorization credential.
        executeRequestId:
          type: string
          nullable: true
          description: >
            Execute request correlation ID (prefix "exe_"). Only present
            after a successful pre-execution audit write. Not an authorization credential.
        preExecutionAuditStatus:
          type: string
          nullable: true
          enum: [written, null]
          description: >
            Pre-execution audit write status. "written" when audit was persisted,
            null when audit was not reached or failed.
        handlerLookupId:
          type: string
          nullable: true
          description: >
            Handler lookup correlation ID (prefix "hl_"). Only present after
            a successful handler lookup. Not an authorization credential.
        handlerLookupStatus:
          type: string
          nullable: true
          enum: [found, null]
          description: >
            Handler lookup status. "found" when handler metadata was resolved,
            null when handler lookup was not reached or failed.
        handlerDescriptor:
          $ref: "#/components/schemas/ToolHandlerDescriptor"
          description: >
            Safe handler descriptor. Only present after successful handler lookup.
            Contains metadata only — no callable references, no secrets.
        dispatchId:
          type: string
          nullable: true
          description: >
            Dispatch plan correlation ID (prefix "dsp_"). Only present after a
            successful safe dispatch plan build. Not an authorization credential —
            correlation-only. Tool Handler call remains disabled.
        dispatchStatus:
          type: string
          nullable: true
          enum: [planned, null]
          description: >
            Dispatch plan status. "planned" when a safe dispatch plan was built,
            null when dispatch planning was not reached or failed.
        dispatchPlan:
          $ref: "#/components/schemas/ToolDispatchPlan"
          nullable: true
          description: >
            Safe dispatch plan / envelope. Only present after a successful safe
            dispatch plan build. Contains metadata only — no callable references,
            no raw arguments, no raw token, no secrets, no Provider Schema payload.
            Dispatch plan existence is NOT execution permission.

    ToolHandlerDescriptor:
      type: object
      description: >
        Safe handler descriptor containing metadata only. No callable objects,
        function references, secrets, or authorization credentials.
      properties:
        canonicalName:
          type: string
          description: Tool canonical name.
        handlerId:
          type: string
          description: Handler identifier (e.g. "handler_clarify").
        registryKey:
          type: string
          description: Tool registry key.
        moduleName:
          type: string
          description: Module name (metadata only, not importable).
        callableName:
          type: string
          description: Callable name (metadata only, not invocable).
        riskTier:
          type: string
          description: Risk tier (e.g. "R0").
        allowlisted:
          type: boolean
          description: Whether the tool is on the STATIC_ALLOWLIST.
        dispatchAllowed:
          type: boolean
          enum: [false]
          description: Always false. Dispatch requires separate phase approval.
        executionAllowed:
          type: boolean
          enum: [false]
          description: Always false. Execution requires separate phase approval.
        providerSchemaAllowed:
          type: boolean
          enum: [false]
          description: Always false. Provider schema requires separate phase approval.
        sideEffectFreeLookup:
          type: boolean
          description: Whether the lookup was side-effect-free.

    ToolDispatchPlan:
      type: object
      description: >
        Safe dispatch plan / envelope containing metadata only. No callable
        objects, function references, raw arguments, raw token, full tokenHash,
        provider credentials, or Provider Schema payload. Dispatch plan
        existence is NOT execution permission — Tool Handler call remains
        disabled. All side-effect flags are always false.
      required:
        - canonicalName
        - handlerLookupId
        - handlerId
        - registryKey
        - routingMode
        - dispatchAllowed
        - toolHandlerCallAllowed
        - executionAllowed
        - providerSchemaAllowed
        - sideEffectFreeDispatch
        - dispatchPlanVersion
      properties:
        canonicalName:
          type: string
          description: The allowlisted canonical tool name.
        handlerLookupId:
          type: string
          description: Correlation ID from the successful handler lookup.
        handlerId:
          type: string
          description: Handler identifier (e.g. "handler_clarify").
        registryKey:
          type: string
          description: Tool registry key.
        routingMode:
          type: string
          enum: [metadata_only]
          description: Routing mode is always metadata-only in this phase.
        dispatchAllowed:
          type: boolean
          enum: [false]
          description: Always false. No dispatch runtime invocation occurs.
        toolHandlerCallAllowed:
          type: boolean
          enum: [false]
          description: Always false. Tool Handler call requires separate phase.
        executionAllowed:
          type: boolean
          enum: [false]
          description: Always false. Execution requires separate phase approval.
        providerSchemaAllowed:
          type: boolean
          enum: [false]
          description: Always false. Provider Schema sending requires separate phase.
        sideEffectFreeDispatch:
          type: boolean
          enum: [true]
          description: Always true. Dispatch planning is side-effect-free metadata only.
        dispatchPlanVersion:
          type: integer
          description: Dispatch plan schema version.
        toolsetName:
          type: string
          nullable: true
          description: Optional toolset name metadata.
        category:
          type: string
          nullable: true
          description: Optional category metadata.
        riskTier:
          type: string
          nullable: true
          description: Risk tier from the handler descriptor (e.g. "R0").
        policyVersion:
          type: string
          nullable: true
          description: Optional policy version metadata.
        handlerDescriptorVersion:
          type: integer
          nullable: true
          description: Optional handler descriptor version metadata.

    ToolExecuteResponse:
      type: object
      required: [ok, data, error, meta]
      properties:
        ok:
          type: boolean
          description: True for success, false for error.
        data:
          $ref: "#/components/schemas/ToolExecuteData"
          nullable: true
        error:
          type: object
          nullable: true
          required: [code, message]
          properties:
            code:
              type: string
              description: Error code.
            message:
              type: string
              description: Human-readable error description.
        meta:
          $ref: "#/components/schemas/Meta"
