openapi: 3.1.0
info:
  title: Hermes Dev WebUI API
  description: >
    Read-only API for the Hermes Dev WebUI. Provides session, memory, context preview,
    and agent status data from the development Hermes instance. All endpoints are
    side-effect-free and restricted to localhost access only.
  version: 1.0.0-draft
  contact:
    name: Hermes Dev Team

servers:
  - url: http://127.0.0.1:5181/api/dev/v1
    description: Local development only

security: []

tags:
  - name: System
    description: System status and health
  - name: Sessions
    description: Session list and detail
  - name: Messages
    description: Session messages
  - name: Memory
    description: Memory categories, items, and status
  - name: Context
    description: Runtime memory context preview
  - name: Agent
    description: Agent configuration status
  - name: Files
    description: File browsing status
  - name: Reviews
    description: Review queue read-only access, dry-run preview, and dev-only execute
  - name: Tools
    description: Tool policy and catalog read-only access

paths:
  /status:
    get:
      operationId: getSystemStatus
      tags: [System]
      summary: System status and environment verification
      responses:
        "200":
          description: System status
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StatusResponse"

  /sessions:
    get:
      operationId: listSessions
      tags: [Sessions]
      summary: List sessions with pagination
      parameters:
        - name: limit
          in: query
          schema:
            type: integer
            minimum: 1
            maximum: 100
            default: 30
        - name: offset
          in: query
          schema:
            type: integer
            minimum: 0
            default: 0
        - name: query
          in: query
          description: Search session titles and session identifiers. Message contents are not searched in Phase 0C-03.
          schema:
            type: string
            maxLength: 500
        - name: source
          in: query
          description: Filter by source platform
          schema:
            type: string
        - name: order
          in: query
          description: Sort order
          schema:
            type: string
            enum: [recent, created]
            default: recent
        - name: archived
          in: query
          description: Archive filter
          schema:
            type: string
            enum: [exclude, include, only]
            default: exclude
      responses:
        "200":
          description: Session list
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SessionListResponse"
        "400":
          description: Invalid parameters
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "503":
          description: Session store unavailable
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /sessions/{sessionId}:
    get:
      operationId: getSession
      tags: [Sessions]
      summary: Get session detail
      parameters:
        - name: sessionId
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Session detail
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SessionDetailResponse"
        "404":
          description: Session not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /sessions/{sessionId}/messages:
    get:
      operationId: getSessionMessages
      tags: [Messages]
      summary: Get messages for a session
      parameters:
        - name: sessionId
          in: path
          required: true
          schema:
            type: string
        - name: limit
          in: query
          schema:
            type: integer
            minimum: 1
            maximum: 100
            default: 50
        - name: offset
          in: query
          schema:
            type: integer
            minimum: 0
            default: 0
        - name: before
          in: query
          description: Message ID anchor - return messages before this ID
          schema:
            type: integer
        - name: after
          in: query
          description: Message ID anchor - return messages after this ID
          schema:
            type: integer
      responses:
        "200":
          description: Message list
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MessageListResponse"
        "404":
          description: Session not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "503":
          description: Session store unavailable
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /memory/status:
    get:
      operationId: getMemoryStatus
      tags: [Memory]
      summary: Memory system status
      responses:
        "200":
          description: Memory status
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MemoryStatusResponse"
        "503":
          description: Memory store unavailable
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /memory/categories:
    get:
      operationId: listMemoryCategories
      tags: [Memory]
      summary: List memory categories
      parameters:
        - name: includeArchived
          in: query
          schema:
            type: boolean
            default: false
      responses:
        "200":
          description: Category list
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CategoryListResponse"

  /memory/items:
    get:
      operationId: listMemoryItems
      tags: [Memory]
      summary: List memory items
      parameters:
        - name: category
          in: query
          schema:
            type: string
        - name: query
          in: query
          schema:
            type: string
            maxLength: 200
          description: Search query for memory items
        - name: includeArchived
          in: query
          schema:
            type: boolean
            default: false
        - name: limit
          in: query
          schema:
            type: integer
            minimum: 1
            maximum: 100
            default: 30
        - name: offset
          in: query
          schema:
            type: integer
            minimum: 0
            default: 0
      responses:
        "200":
          description: Memory items
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MemoryItemListResponse"

  /memory/items/{memoryId}:
    get:
      operationId: getMemoryItem
      tags: [Memory]
      summary: Get memory item detail
      parameters:
        - name: memoryId
          in: path
          required: true
          schema:
            type: string
            pattern: "^MEM-[A-Z]+-\\d+$"
      responses:
        "200":
          description: Memory item detail
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MemoryItemDetailResponse"
        "404":
          description: Memory item not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /memory/write/dry-run:
    post:
      operationId: memoryWriteDryRun
      tags: [Memory]
      summary: Preview WRITE operation (dry-run, no side effects)
      description: >
        Evaluates a memory WRITE candidate and returns a decision preview
        without modifying any files. The response includes the computed score,
        similarity analysis, protection checks, and predicted effects.
        This endpoint is completely side-effect-free.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [query, candidate]
              properties:
                query:
                  type: string
                  maxLength: 2000
                  description: The user message or context for the memory candidate.
                candidate:
                  type: object
                  required: [summary, category, importance, ttl, tags]
                  properties:
                    title:
                      type: string
                      maxLength: 120
                    summary:
                      type: string
                      maxLength: 1000
                    category:
                      type: string
                      maxLength: 100
                      pattern: "^[a-z0-9][a-z0-9_-]*$"
                    type:
                      type: string
                      maxLength: 50
                    importance:
                      type: string
                      enum: [P0, P1, P2, P3]
                    ttl:
                      type: string
                      enum: [permanent, project, session, temporary]
                    tags:
                      type: array
                      items:
                        type: string
                        maxLength: 50
                      maxItems: 20
                    sourceConfidence:
                      type: string
                      enum: [user_confirmed, assistant_inferred]
                options:
                  type: object
                  properties:
                    allowReviewRecommendation:
                      type: boolean
                      default: true
                    includeSimilarity:
                      type: boolean
                      default: true
                    includeEffects:
                      type: boolean
                      default: true
      responses:
        "200":
          description: WRITE dry-run preview result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MemoryDryRunResponse"
        "400":
          description: Invalid request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "503":
          description: Memory system unavailable
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /memory/items/{memoryId}/update/dry-run:
    post:
      operationId: memoryUpdateDryRun
      tags: [Memory]
      summary: Preview UPDATE operation (dry-run, no side effects)
      description: >
        Evaluates an UPDATE candidate against an existing memory item and returns
        a decision preview including diff, similarity, and protection checks.
        No files are modified.
      parameters:
        - name: memoryId
          in: path
          required: true
          schema:
            type: string
            pattern: "^MEM-[A-Z]+-\\d+$"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [candidate]
              properties:
                candidate:
                  type: object
                  required: [summary]
                  properties:
                    summary:
                      type: string
                      maxLength: 1000
                    type:
                      type: string
                      maxLength: 50
                    importance:
                      type: string
                      enum: [P0, P1, P2, P3]
                    ttl:
                      type: string
                      enum: [permanent, project, session, temporary]
                    tags:
                      type: array
                      items:
                        type: string
                        maxLength: 50
                      maxItems: 20
                options:
                  type: object
                  properties:
                    includeDiff:
                      type: boolean
                      default: true
                    includeSimilarity:
                      type: boolean
                      default: true
                    includeEffects:
                      type: boolean
                      default: true
      responses:
        "200":
          description: UPDATE dry-run preview result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MemoryDryRunResponse"
        "400":
          description: Invalid request or memory ID
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: Memory item not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "503":
          description: Memory system unavailable
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /memory/items/{memoryId}/archive/dry-run:
    post:
      operationId: memoryArchiveDryRun
      tags: [Memory]
      summary: Preview ARCHIVE operation (dry-run, no side effects)
      description: >
        Evaluates an ARCHIVE operation on a memory item and returns protection
        checks and predicted effects. P0 and permanent items are independently
        blocked. No files are modified.
      parameters:
        - name: memoryId
          in: path
          required: true
          schema:
            type: string
            pattern: "^MEM-[A-Z]+-\\d+$"
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              properties:
                reason:
                  type: string
                  maxLength: 500
                  description: Optional archive reason.
                options:
                  type: object
                  properties:
                    includeEffects:
                      type: boolean
                      default: true
                    includeReferences:
                      type: boolean
                      default: true
      responses:
        "200":
          description: ARCHIVE dry-run preview result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MemoryDryRunResponse"
        "400":
          description: Invalid request or memory ID
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: Memory item not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "503":
          description: Memory system unavailable
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /context/preview:
    post:
      operationId: previewContext
      tags: [Context]
      summary: Preview runtime memory context for a query
      description: >
        Returns the memory context that would be loaded for a given user message.
        This endpoint is completely side-effect-free: no LLM calls, no persistence,
        no session writes, no memory writes, no file modifications.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ContextPreviewRequest"
      responses:
        "200":
          description: Context preview result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ContextPreviewResponse"
        "400":
          description: Invalid request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "422":
          description: Preview validation failed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "503":
          description: Context loader unavailable
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /agent/status:
    get:
      operationId: getAgentStatus
      tags: [Agent]
      summary: Agent configuration and runtime status
      responses:
        "200":
          description: Agent status
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AgentStatusResponse"
        "503":
          description: Agent status unavailable
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /agent/prompt/preview:
    post:
      operationId: agentPromptPreview
      tags: [Agent]
      summary: Preview agent prompt assembly (dry-run, no side effects)
      description: >
        Assembles the agent's prompt metadata without calling any LLM,
        executing any tool, or writing any data. Returns section breakdowns,
        model info, memory context, and safety flags.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [message]
              properties:
                sessionId:
                  type: string
                  maxLength: 200
                  description: Optional session ID to include history.
                message:
                  type: string
                  minLength: 1
                  maxLength: 4000
                  description: The user message to preview prompt assembly for.
                options:
                  type: object
                  properties:
                    includeHistory:
                      type: boolean
                      default: true
                    historyLimit:
                      type: integer
                      minimum: 0
                      maximum: 100
                      default: 20
                    includeMemoryContext:
                      type: boolean
                      default: true
                    memoryQuery:
                      type: string
                      maxLength: 1000
                    maxCategories:
                      type: integer
                      minimum: 0
                      maximum: 20
                      default: 5
                    maxMemories:
                      type: integer
                      minimum: 0
                      maximum: 50
                      default: 10
                    includeSystemPreview:
                      type: boolean
                      default: false
                    includeToolMetadata:
                      type: boolean
                      default: true
                overrides:
                  type: object
                  properties:
                    model:
                      type: string
                      nullable: true
                    temperature:
                      type: number
                      minimum: 0.0
                      maximum: 2.0
                      nullable: true
                    maxOutputTokens:
                      type: integer
                      minimum: 1
                      maximum: 32768
                      nullable: true
      responses:
        "200":
          description: Prompt preview result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AgentPreviewResponse"
        "400":
          description: Invalid request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "503":
          description: Agent preview unavailable
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /agent/run/dry-run:
    post:
      operationId: agentRunDryRun
      tags: [Agent]
      summary: Preview agent run capabilities (dry-run, no side effects)
      description: >
        Simulates what an agent run would do without calling any LLM,
        executing any tool, or writing any data. All execution capabilities
        are forced disabled. Returns capability plan and safety flags.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [message]
              properties:
                sessionId:
                  type: string
                  maxLength: 200
                message:
                  type: string
                  minLength: 1
                  maxLength: 4000
                options:
                  type: object
                  properties:
                    includeHistory:
                      type: boolean
                      default: true
                    historyLimit:
                      type: integer
                      minimum: 0
                      maximum: 100
                      default: 20
                    includeMemoryContext:
                      type: boolean
                      default: true
                    memoryQuery:
                      type: string
                      maxLength: 1000
                    toolsRequested:
                      type: boolean
                      default: false
                    streamRequested:
                      type: boolean
                      default: false
                    autoMemoryRequested:
                      type: boolean
                      default: false
                overrides:
                  type: object
                  properties:
                    model:
                      type: string
                      nullable: true
                    temperature:
                      type: number
                      minimum: 0.0
                      maximum: 2.0
                      nullable: true
                    maxOutputTokens:
                      type: integer
                      minimum: 1
                      maximum: 32768
                      nullable: true
      responses:
        "200":
          description: Agent run dry-run result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AgentPreviewResponse"
        "400":
          description: Invalid request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "503":
          description: Agent preview unavailable
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /files/status:
    get:
      operationId: getFilesStatus
      tags: [Files]
      summary: File browsing availability
      responses:
        "200":
          description: Files status
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/FilesStatusResponse"

  /reviews/status:
    get:
      operationId: getReviewQueueStatus
      tags: [Reviews]
      summary: Review queue status and safety flags
      description: >
        Returns the review queue status including availability, item counts,
        and safety flags. All safety flags (writeEnabled, approveEnabled,
        rejectEnabled, enqueueEnabled) are always false in Phase 1A.
      responses:
        "200":
          description: Review queue status
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ReviewQueueStatusResponse"

  /reviews:
    get:
      operationId: listReviewItems
      tags: [Reviews]
      summary: List review queue items
      description: >
        Returns a paginated, filtered list of review items. Only whitelisted
        fields are included — no fingerprint, source, raw candidate, or
        evaluation details are returned.
      parameters:
        - name: status
          in: query
          description: Filter by review status
          schema:
            type: string
            enum: [pending, approved, rejected, failed, all]
        - name: decision
          in: query
          description: Filter by original memory decision
          schema:
            type: string
            enum: [WRITE, UPDATE, REVIEW, SKIP, SKIP_DUPLICATE, UNDECIDED, all]
        - name: category
          in: query
          description: Filter by memory category
          schema:
            type: string
            maxLength: 64
        - name: query
          in: query
          description: Search review titles and summaries
          schema:
            type: string
            maxLength: 200
        - name: limit
          in: query
          schema:
            type: integer
            minimum: 1
            maximum: 100
            default: 30
        - name: offset
          in: query
          schema:
            type: integer
            minimum: 0
            default: 0
        - name: order
          in: query
          description: Sort order
          schema:
            type: string
            enum: [created_desc, updated_desc]
            default: updated_desc
      responses:
        "200":
          description: Review items list
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ReviewListResponse"
        "400":
          description: Invalid query parameters
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "503":
          description: Review queue unavailable
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /reviews/{reviewId}:
    get:
      operationId: getReviewItem
      tags: [Reviews]
      summary: Get review item detail
      description: >
        Returns full detail for a single review item. Summary is truncated
        to 300 chars. No fingerprint, source, raw candidate text, or
        approval/rejection objects are returned. Safety flags are always
        read-only in Phase 1A.
      parameters:
        - name: reviewId
          in: path
          required: true
          schema:
            type: string
            pattern: "^MR-\\d{8}T\\d{6}-[0-9a-f]{8}$"
            maxLength: 256
      responses:
        "200":
          description: Review item detail
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ReviewDetailResponse"
        "400":
          description: Invalid review ID
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: Review item not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "503":
          description: Review queue unavailable
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /reviews/{reviewId}/approve/dry-run:
    post:
      operationId: approveDryRun
      tags: [Reviews]
      summary: Preview approve action (dry-run, no side effects)
      description: >
        Preview what would happen if a review item were approved, without
        executing any real operation. This endpoint is completely side-effect-free:
        no files are modified, no events are appended, no memory is written,
        and no review status is changed. Returns validation checks, safety
        information, and a preview of the effects that would occur in a real
        approve (Phase 1C).
      parameters:
        - name: reviewId
          in: path
          required: true
          schema:
            type: string
            pattern: "^MR-\\d{8}T\\d{6}-[0-9a-f]{8}$"
            maxLength: 256
      responses:
        "200":
          description: Dry-run preview result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DryRunResponse"
        "400":
          description: Invalid review ID
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: Review item not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "409":
          description: Review item is not pending
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "503":
          description: Review dry-run unavailable
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /reviews/{reviewId}/reject/dry-run:
    post:
      operationId: rejectDryRun
      tags: [Reviews]
      summary: Preview reject action (dry-run, no side effects)
      description: >
        Preview what would happen if a review item were rejected, without
        executing any real operation. This endpoint is completely side-effect-free:
        no files are modified, no events are appended, and no review status
        is changed. Reject does not write memory — it only changes the review
        item status and appends a rejection event.
      parameters:
        - name: reviewId
          in: path
          required: true
          schema:
            type: string
            pattern: "^MR-\\d{8}T\\d{6}-[0-9a-f]{8}$"
            maxLength: 256
      responses:
        "200":
          description: Dry-run preview result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DryRunResponse"
        "400":
          description: Invalid review ID
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: Review item not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "409":
          description: Review item is not pending
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "503":
          description: Review dry-run unavailable
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /reviews/{reviewId}/approve/execute:
    post:
      operationId: approveExecute
      tags: [Reviews]
      summary: Execute approve action (dev-only, requires confirmation)
      description: >
        Execute a real approve on a review item. This endpoint has real side effects:
        it writes memory files, updates review status, and appends audit events.
        It is gated by a fail-closed kill switch (HERMES_REVIEW_EXECUTE_ENABLED=true)
        and dev-only environment guard. Requires explicit confirmation text,
        dry-run preview, and acknowledged effects.
      parameters:
        - name: reviewId
          in: path
          required: true
          schema:
            type: string
            pattern: "^MR-\\d{8}T\\d{6}-[0-9a-f]{8}$"
            maxLength: 256
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ReviewExecuteRequest"
      responses:
        "200":
          description: Execute result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ReviewExecuteResponse"
        "400":
          description: Invalid confirmation or parameters
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: Review item not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "409":
          description: Review not pending, precondition failed, or approval blocked
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "503":
          description: Execute disabled or environment unsafe
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /reviews/{reviewId}/reject/execute:
    post:
      operationId: rejectExecute
      tags: [Reviews]
      summary: Execute reject action (dev-only, requires confirmation)
      description: >
        Execute a real reject on a review item. This endpoint has real side effects:
        it updates review status and appends audit events. No memory is written.
        It is gated by a fail-closed kill switch (HERMES_REVIEW_EXECUTE_ENABLED=true)
        and dev-only environment guard. Requires explicit confirmation text,
        dry-run preview, and acknowledged effects.
      parameters:
        - name: reviewId
          in: path
          required: true
          schema:
            type: string
            pattern: "^MR-\\d{8}T\\d{6}-[0-9a-f]{8}$"
            maxLength: 256
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ReviewRejectExecuteRequest"
      responses:
        "200":
          description: Execute result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ReviewExecuteResponse"
        "400":
          description: Invalid confirmation or parameters
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: Review item not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "409":
          description: Review not pending or precondition failed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "503":
          description: Execute disabled or environment unsafe
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /agent/runs:
    post:
      tags: [Agent]
      summary: Create agent run (dev-only, no tools, streaming only)
      operationId: createAgentRun
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - sessionId
                - message
                - confirmationText
                - dryRunPreviewed
                - acknowledgedEffects
                - options
              properties:
                sessionId:
                  type: string
                  description: Existing session ID
                message:
                  type: string
                  minLength: 1
                  maxLength: 4000
                confirmationText:
                  type: string
                  enum: ["RUN"]
                dryRunPreviewed:
                  type: boolean
                  enum: [true]
                previewRequestId:
                  type: string
                  description: Optional Phase 1E preview request ID
                acknowledgedEffects:
                  type: array
                  items:
                    type: string
                  description: Must be exactly ["CALL_LLM", "WRITE_SESSION"]
                options:
                  type: object
                  required:
                    - stream
                    - tools
                    - autoMemory
                  properties:
                    stream:
                      type: boolean
                      enum: [true]
                    tools:
                      type: boolean
                      enum: [false]
                    autoMemory:
                      type: boolean
                      enum: [false]
                overrides:
                  type: object
                  properties:
                    model:
                      type: string
                      nullable: true
                    temperature:
                      type: number
                      nullable: true
                      minimum: 0.0
                      maximum: 2.0
                    maxOutputTokens:
                      type: integer
                      nullable: true
                      minimum: 1
                      maximum: 4096
              additionalProperties: false
      responses:
        "202":
          description: Run created and dispatched
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: object
                    properties:
                      runId:
                        type: string
                      sessionId:
                        type: string
                      status:
                        type: string
                        enum: [CREATED]
                      streamUrl:
                        type: string
                      statusUrl:
                        type: string
                      cancelUrl:
                        type: string
                      model:
                        type: object
                        properties:
                          name:
                            type: string
                          provider:
                            type: string
                      capabilities:
                        type: object
                        properties:
                          llmCall:
                            type: boolean
                          streaming:
                            type: boolean
                          tools:
                            type: boolean
                          autoMemory:
                            type: boolean
                          sessionWrite:
                            type: boolean
                          memoryWrite:
                            type: boolean
                          reviewQueue:
                            type: boolean
                      safety:
                        type: object
                        properties:
                          devOnly:
                            type: boolean
                          killSwitchEnabled:
                            type: boolean
                          toolsDisabled:
                            type: boolean
                          autoMemoryDisabled:
                            type: boolean
                  meta:
                    type: object
                    properties:
                      requestId:
                        type: string
                      timestamp:
                        type: string
        "400":
          description: Invalid request
        "404":
          description: Session not found
        "409":
          description: Session busy or capacity reached
        "429":
          description: Rate limited
        "503":
          description: Agent Run disabled or environment unsafe

  /agent/runs/{runId}:
    get:
      tags: [Agent]
      summary: Get agent run status
      operationId: getAgentRunStatus
      parameters:
        - name: runId
          in: path
          required: true
          schema:
            type: string
            pattern: "^run-[0-9a-f]{32}$"
      responses:
        "200":
          description: Run status
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: object
                    properties:
                      runId:
                        type: string
                      sessionId:
                        type: string
                      status:
                        type: string
                        enum: [CREATED, STARTING, RUNNING, CANCELLING, COMPLETED, CANCELLED, FAILED]
                      createdAt:
                        type: string
                        format: date-time
                      startedAt:
                        type: string
                        format: date-time
                        nullable: true
                      completedAt:
                        type: string
                        format: date-time
                        nullable: true
                      cancelRequested:
                        type: boolean
                      clientConnected:
                        type: boolean
                      model:
                        type: object
                        properties:
                          name:
                            type: string
                          provider:
                            type: string
                      usage:
                        type: object
                        nullable: true
                        properties:
                          inputTokens:
                            type: integer
                            nullable: true
                          outputTokens:
                            type: integer
                            nullable: true
                          totalTokens:
                            type: integer
                            nullable: true
                          cachedTokens:
                            type: integer
                            nullable: true
                          cost:
                            type: number
                            nullable: true
                          costEstimated:
                            type: boolean
                      error:
                        type: object
                        nullable: true
                        properties:
                          code:
                            type: string
                          message:
                            type: string
                  meta:
                    type: object
                    properties:
                      requestId:
                        type: string
                      timestamp:
                        type: string
        "400":
          description: Invalid run ID
        "404":
          description: Run not found
        "503":
          description: Agent Run disabled

  /agent/runs/{runId}/events:
    get:
      tags: [Agent]
      summary: SSE stream for agent run events
      operationId: streamAgentRunEvents
      parameters:
        - name: runId
          in: path
          required: true
          schema:
            type: string
            pattern: "^run-[0-9a-f]{32}$"
        - name: Last-Event-ID
          in: header
          required: false
          schema:
            type: integer
          description: Last event sequence ID for reconnection
      responses:
        "200":
          description: SSE event stream
          content:
            text/event-stream:
              schema:
                type: string
                description: Server-Sent Events stream
        "400":
          description: Invalid run ID or Last-Event-ID
        "404":
          description: Run not found
        "410":
          description: Event buffer expired

  /agent/runs/{runId}/cancel:
    post:
      tags: [Agent]
      summary: Cancel agent run (idempotent)
      operationId: cancelAgentRun
      parameters:
        - name: runId
          in: path
          required: true
          schema:
            type: string
            pattern: "^run-[0-9a-f]{32}$"
      responses:
        "200":
          description: Cancel acknowledged
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: object
                    properties:
                      runId:
                        type: string
                      cancelRequested:
                        type: boolean
                      statusBefore:
                        type: string
                      statusAfter:
                        type: string
                      alreadyTerminal:
                        type: boolean
                  meta:
                    type: object
                    properties:
                      requestId:
                        type: string
                      timestamp:
                        type: string
        "400":
          description: Invalid run ID
        "404":
          description: Run not found
        "503":
          description: Agent Run disabled

  /tools/policy:
    get:
      operationId: getToolPolicyStatus
      tags: [Tools]
      summary: Tool policy status overview
      description: >
        Returns the current static tool policy configuration including inventory
        counts, risk distribution, execution flags (all false), and safety flags.
        All data is read-only and derived from the static policy module.
        No Registry, Handler, Provider, or SessionDB is accessed.
      responses:
        "200":
          description: Tool policy status
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ToolPolicyStatusResponse"
        "500":
          description: Tool policy data integrity error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "503":
          description: Tool policy service unavailable
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /tools/catalog:
    get:
      operationId: listToolCatalog
      tags: [Tools]
      summary: Filtered, paginated tool catalog
      description: >
        Returns a filtered, sorted, and paginated list of all tools in the
        static policy inventory. Each item includes whitelisted metadata only —
        no handler, callable, source path, or schema is exposed.
        All tools have allowed=false and all execution flags are false.
      parameters:
        - name: q
          in: query
          description: Search tool names and rationale previews
          schema:
            type: string
            maxLength: 120
        - name: risk
          in: query
          description: Filter by risk level
          schema:
            type: string
            enum: [R0, R1, R2, R3, R4, R5]
        - name: capability
          in: query
          description: Filter by capability
          schema:
            type: string
            enum:
              - PURE_COMPUTE
              - LOCAL_FILE_READ
              - LOCAL_FILE_WRITE
              - DATABASE_READ
              - DATABASE_WRITE
              - NETWORK_READ
              - NETWORK_WRITE
              - PROCESS_EXECUTION
              - CODE_EXECUTION
              - BROWSER_CONTROL
              - DESKTOP_CONTROL
              - CREDENTIAL_USE
              - REMOTE_STATE_MUTATION
              - MESSAGE_SEND
              - MEDIA_GENERATION
              - ADMINISTRATIVE_ACTION
              - SCHEDULING
              - SUB_AGENT_EXECUTION
        - name: policyStatus
          in: query
          description: Filter by derived policy status
          schema:
            type: string
            enum: [PERMANENTLY_DENIED, CANDIDATE, UNLISTED, STATICALLY_ALLOWED]
        - name: page
          in: query
          description: Page number (1-based)
          schema:
            type: integer
            minimum: 1
            default: 1
        - name: pageSize
          in: query
          description: Items per page
          schema:
            type: integer
            minimum: 1
            maximum: 100
            default: 25
        - name: sort
          in: query
          description: Sort order
          schema:
            type: string
            enum: [nameAsc, nameDesc, riskAsc, riskDesc]
            default: nameAsc
      responses:
        "200":
          description: Tool catalog list
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ToolCatalogResponse"
        "400":
          description: Invalid query parameter
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "500":
          description: Tool policy data integrity error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "503":
          description: Tool policy service unavailable
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

components:
  schemas:
    # ── Common ──
    Meta:
      type: object
      required: [requestId, timestamp]
      properties:
        requestId:
          type: string
          maxLength: 64
        timestamp:
          type: string
          format: date-time
          description: ISO 8601 UTC

    ErrorBody:
      type: object
      required: [code, message]
      properties:
        code:
          type: string
          description: Stable business error code
          examples:
            - SESSION_NOT_FOUND
            - INVALID_LIMIT
        message:
          type: string
          description: Human-readable error description
        details:
          type: string
          nullable: true

    Page:
      type: object
      required: [limit, total, hasMore]
      properties:
        offset:
          type: integer
        limit:
          type: integer
        total:
          type: integer
        hasMore:
          type: boolean

    ErrorResponse:
      type: object
      required: [error, meta]
      properties:
        error:
          $ref: "#/components/schemas/ErrorBody"
        meta:
          $ref: "#/components/schemas/Meta"

    # ── Status ──
    Isolation:
      type: object
      required: [passed, usesDevelopmentHome, productionHomeUntouched, bindHost]
      properties:
        passed:
          type: boolean
        usesDevelopmentHome:
          type: boolean
        productionHomeUntouched:
          type: boolean
        bindHost:
          type: string
          enum: ["127.0.0.1"]

    ServiceStatus:
      type: object
      required: [available, readOnly]
      properties:
        available:
          type: boolean
        readOnly:
          type: boolean

    GatewayStatus:
      type: object
      required: [status]
      properties:
        status:
          type: string
          enum: [running, stopped, unknown]

    Services:
      type: object
      required: [sessions, memory, agent, gateway]
      properties:
        sessions:
          $ref: "#/components/schemas/ServiceStatus"
        memory:
          $ref: "#/components/schemas/ServiceStatus"
        agent:
          $ref: "#/components/schemas/ServiceStatus"
        gateway:
          $ref: "#/components/schemas/GatewayStatus"

    StatusData:
      type: object
      required: [environment, apiVersion, status, isolation, services]
      properties:
        environment:
          type: string
          enum: [development]
        apiVersion:
          type: string
          enum: ["v1"]
        status:
          type: string
          enum: [ok, degraded, error]
        isolation:
          $ref: "#/components/schemas/Isolation"
        services:
          $ref: "#/components/schemas/Services"

    StatusResponse:
      type: object
      required: [data, meta]
      properties:
        data:
          $ref: "#/components/schemas/StatusData"
        meta:
          $ref: "#/components/schemas/Meta"

    # ── Sessions ──
    SessionListItem:
      type: object
      required: [id, source, messageCount, archived, startedAt]
      properties:
        id:
          type: string
        title:
          type: string
          nullable: true
        source:
          type: string
        model:
          type: string
          nullable: true
        messageCount:
          type: integer
        toolCallCount:
          type: integer
        archived:
          type: boolean
        startedAt:
          type: string
          format: date-time
        endedAt:
          type: string
          format: date-time
          nullable: true
        lastActiveAt:
          type: string
          format: date-time
          nullable: true
        preview:
          type: string
          nullable: true
          maxLength: 63

    SessionListData:
      type: object
      required: [items, page]
      properties:
        items:
          type: array
          items:
            $ref: "#/components/schemas/SessionListItem"
        page:
          $ref: "#/components/schemas/Page"

    SessionListResponse:
      type: object
      required: [data, meta]
      properties:
        data:
          $ref: "#/components/schemas/SessionListData"
        meta:
          $ref: "#/components/schemas/Meta"

    SessionDetail:
      type: object
      required: [id, source, messageCount, archived, startedAt]
      properties:
        id:
          type: string
        title:
          type: string
          nullable: true
        source:
          type: string
        model:
          type: string
          nullable: true
        messageCount:
          type: integer
        toolCallCount:
          type: integer
        inputTokens:
          type: integer
          nullable: true
        outputTokens:
          type: integer
          nullable: true
        archived:
          type: boolean
        startedAt:
          type: string
          format: date-time
        endedAt:
          type: string
          format: date-time
          nullable: true
        lastActiveAt:
          type: string
          format: date-time
          nullable: true
        endReason:
          type: string
          nullable: true

    SessionDetailResponse:
      type: object
      required: [data, meta]
      properties:
        data:
          $ref: "#/components/schemas/SessionDetail"
        meta:
          $ref: "#/components/schemas/Meta"

    # ── Messages ──
    TextContent:
      type: object
      required: [type, text]
      properties:
        type:
          type: string
          enum: [text]
        text:
          type: string

    StructuredContent:
      type: object
      required: [type, parts]
      properties:
        type:
          type: string
          enum: [structured]
        parts:
          type: array
          items:
            type: object

    EmptyContent:
      type: object
      required: [type]
      properties:
        type:
          type: string
          enum: [empty]

    MessageContent:
      oneOf:
        - $ref: "#/components/schemas/TextContent"
        - $ref: "#/components/schemas/StructuredContent"
        - $ref: "#/components/schemas/EmptyContent"

    ToolCall:
      type: object
      required: [id, type, function]
      properties:
        id:
          type: string
        type:
          type: string
          enum: [function]
        function:
          type: object
          required: [name, arguments]
          properties:
            name:
              type: string
            arguments:
              type: string
              description: JSON-encoded arguments (truncated at 200 chars)

    MessageItem:
      type: object
      required: [id, role, content, timestamp]
      properties:
        id:
          type: integer
        role:
          type: string
          enum: [user, assistant, tool, system]
        content:
          $ref: "#/components/schemas/MessageContent"
        timestamp:
          type: string
          format: date-time
        tokenCount:
          type: integer
          nullable: true
        finishReason:
          type: string
          nullable: true
        toolCalls:
          type: array
          items:
            $ref: "#/components/schemas/ToolCall"
          nullable: true
        toolCallId:
          type: string
          nullable: true
        toolName:
          type: string
          nullable: true

    MessagePage:
      allOf:
        - $ref: "#/components/schemas/Page"
        - type: object
          properties:
            messagesBefore:
              type: integer
              nullable: true
            messagesAfter:
              type: integer
              nullable: true

    MessageListData:
      type: object
      required: [items, page]
      properties:
        items:
          type: array
          items:
            $ref: "#/components/schemas/MessageItem"
        page:
          $ref: "#/components/schemas/MessagePage"

    MessageListResponse:
      type: object
      required: [data, meta]
      properties:
        data:
          $ref: "#/components/schemas/MessageListData"
        meta:
          $ref: "#/components/schemas/Meta"

    # ── Memory ──
    MemoryStatusData:
      type: object
      required: [enabled, categories, memories, capabilities, exposedCapabilities]
      properties:
        enabled:
          type: boolean
        categories:
          type: object
          required: [total, active, archived]
          properties:
            total:
              type: integer
            active:
              type: integer
            archived:
              type: integer
        memories:
          type: object
          required: [total, active, archived]
          properties:
            total:
              type: integer
            active:
              type: integer
            archived:
              type: integer
        capabilities:
          type: object
          required: [contextLoader, reviewQueue]
          properties:
            contextLoader:
              type: boolean
            reviewQueue:
              type: boolean
        exposedCapabilities:
          type: object
          required: [read, write, review, approve, reject]
          properties:
            read:
              type: boolean
            write:
              type: boolean
            review:
              type: boolean
            approve:
              type: boolean
            reject:
              type: boolean

    MemoryStatusResponse:
      type: object
      required: [data, meta]
      properties:
        data:
          $ref: "#/components/schemas/MemoryStatusData"
        meta:
          $ref: "#/components/schemas/Meta"

    CategoryItem:
      type: object
      required: [key, status]
      properties:
        key:
          type: string
        scope:
          type: string
          nullable: true
        priority:
          type: string
          nullable: true
          enum: [P0, P1, P2, P3]
        status:
          type: string
          enum: [active, archived, deprecated, UNKNOWN]
        keywords:
          type: array
          items:
            type: string
        description:
          type: string
          nullable: true
        memoryCount:
          type: integer

    CategoryListData:
      type: object
      required: [items]
      properties:
        items:
          type: array
          items:
            $ref: "#/components/schemas/CategoryItem"

    CategoryListResponse:
      type: object
      required: [data, meta]
      properties:
        data:
          $ref: "#/components/schemas/CategoryListData"
        meta:
          $ref: "#/components/schemas/Meta"

    MemoryItemSummary:
      type: object
      required: [id, title, category, status]
      properties:
        id:
          type: string
          pattern: "^MEM-[A-Z]+-\\d+$"
        title:
          type: string
        category:
          type: string
        summary:
          type: string
          nullable: true
        tags:
          type: array
          items:
            type: string
        importance:
          type: string
          nullable: true
          enum: [P0, P1, P2, P3]
        ttl:
          type: string
          nullable: true
        status:
          type: string
          enum: [active, archived, deprecated, UNKNOWN]
        updatedAt:
          type: string
          nullable: true

    MemoryItemListData:
      type: object
      required: [items, page]
      properties:
        items:
          type: array
          items:
            $ref: "#/components/schemas/MemoryItemSummary"
        page:
          $ref: "#/components/schemas/Page"

    MemoryItemListResponse:
      type: object
      required: [data, meta]
      properties:
        data:
          $ref: "#/components/schemas/MemoryItemListData"
        meta:
          $ref: "#/components/schemas/Meta"

    MemoryItemDetail:
      allOf:
        - $ref: "#/components/schemas/MemoryItemSummary"
        - type: object
          properties:
            type:
              type: string
              nullable: true
            createdAt:
              type: string
              nullable: true
            record:
              type: string
              nullable: true
              description: Full record text, truncated to maxRecordChars
            truncated:
              type: boolean
              default: false

    MemoryItemDetailResponse:
      type: object
      required: [data, meta]
      properties:
        data:
          $ref: "#/components/schemas/MemoryItemDetail"
        meta:
          $ref: "#/components/schemas/Meta"

    # ── Context Preview ──
    ContextPreviewOptions:
      type: object
      properties:
        maxCategories:
          type: integer
          minimum: 1
          maximum: 10
          default: 3
        maxMemories:
          type: integer
          minimum: 1
          maximum: 20
          default: 5
        maxRecordChars:
          type: integer
          minimum: 100
          maximum: 5000
          default: 2000
        includeArchived:
          type: boolean
          default: false

    ContextPreviewRequest:
      type: object
      required: [query]
      properties:
        query:
          type: string
          maxLength: 500
        options:
          $ref: "#/components/schemas/ContextPreviewOptions"

    MatchedCategory:
      type: object
      required: [key, score]
      properties:
        key:
          type: string
        score:
          type: integer
        scope:
          type: string
          nullable: true

    PreviewMemory:
      type: object
      required: [id, category, title, score]
      properties:
        id:
          type: string
        category:
          type: string
        title:
          type: string
        summary:
          type: string
          nullable: true
        score:
          type: integer
        truncated:
          type: boolean
          default: false
        recordPreview:
          type: string
          nullable: true
          description: >
            Record text preview, truncated to 5000 chars. Local absolute paths
            are redacted: /Users/..., /home/..., C:\... → [local-path];
            file://... → [file-uri-redacted]. memory:// and https:// are preserved.

    ContextPreviewLimits:
      type: object
      required: [maxCategories, maxMemories, maxRecordChars]
      properties:
        maxCategories:
          type: integer
        maxMemories:
          type: integer
        maxRecordChars:
          type: integer

    ContextPreviewData:
      type: object
      required: [query, matchedCategories, memories, skipped, limits, sideEffects]
