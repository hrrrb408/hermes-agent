          enum: [false]
        toolExecutionEnabled:
          type: boolean
          enum: [false]
        streamingEnabled:
          type: boolean
          enum: [false]

    AgentStatusData:
      type: object
      required: [available, model, memory, execution]
      properties:
        available:
          type: boolean
        model:
          $ref: "#/components/schemas/AgentModel"
        memory:
          $ref: "#/components/schemas/AgentMemory"
        execution:
          $ref: "#/components/schemas/AgentExecution"

    AgentStatusResponse:
      type: object
      required: [data, meta]
      properties:
        data:
          $ref: "#/components/schemas/AgentStatusData"
        meta:
          $ref: "#/components/schemas/Meta"

    # ── Files ──
    FilesStatusData:
      type: object
      required: [available, reason]
      properties:
        available:
