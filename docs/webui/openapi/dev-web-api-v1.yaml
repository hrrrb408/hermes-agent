            $ref: "#/components/schemas/MatchedCategory"
        memories:
          type: array
          items:
            $ref: "#/components/schemas/PreviewMemory"
        skipped:
          type: array
          items:
            type: string
        limits:
          $ref: "#/components/schemas/ContextPreviewLimits"
        sideEffects:
          type: boolean
          enum: [false]

    ContextPreviewResponse:
      type: object
      required: [data, meta]
      properties:
        data:
          $ref: "#/components/schemas/ContextPreviewData"
