          type: string
        exists:
          type: boolean
        historyIncluded:
          type: boolean
        historyMessageCount:
          type: integer
        historyTruncated:
          type: boolean

    AgentPreviewModel:
      type: object
      properties:
        name:
          type: string
        provider:
          type: string
        temperature:
          type: number
          nullable: true
        maxOutputTokens:
          type: integer
          nullable: true

    AgentPromptMetadata:
      type: object
      properties:
        sectionCount:
          type: integer
        characterCount:
