    ContextPreviewLimits:
      type: object
      required: [maxCategories, maxMemories, maxRecordChars]
      properties:
        maxCategories:
          type: integer
        maxMemories:
          type: integer
        maxRecordChars:
          type: integer

    ContextPreviewData:
      type: object
      required: [query, matchedCategories, memories, skipped, limits, sideEffects]
      properties:
        query:
          type: string
        matchedCategories:
          type: array
